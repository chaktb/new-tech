<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>new-tech</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f5820b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 48px 24px 24px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 2.4rem;
    letter-spacing: -0.02em;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--muted);
    margin-top: 8px;
  }
  main {
    flex: 1;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 24px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  /* AUTO_CARDS */
  .dl-card {
    display: block;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s, transform 0.15s;
  }
  .dl-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .dl-card h3 { font-size: 1.1rem; margin-bottom: 6px; }
  .dl-card p { color: var(--muted); font-size: 0.9rem; }
  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 0.85rem;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
  <header>
    <h1>new-<span>tech</span></h1>
    <p>Deployed on Cloudflare Workers</p>
  </header>
  <main>
    <div class="cards">
      <!-- 새 페이지 추가 시 이 아래에 dl-card 를 복사해서 사용 -->
      <a class="dl-card" href="#">
        <h3>Getting Started</h3>
        <p>첫 번째 페이지를 여기에 추가하세요.</p>
      </a>
    </div>
  </main>
  <footer>
    &copy; 2026 new-tech · Cloudflare Workers + GitHub
  </footer>
</body>
</html>
